apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s
spec:
  selector:
    matchLabels:
      app: k8s
  replicas: 3
  template:
    metadata:
      labels:
        app: k8s
    spec:
      serviceAccountName: api-sa
      volumes:
        - name: k8s-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: demo-eks-secrets
      containers:
        - name: k8s
          image: arijititobuz/kubernetes:7.0.0
          imagePullPolicy: Always
          resources:
            limits:
              memory: '256Mi'
              cpu: '250m'
          ports:
            - containerPort: 3001
          volumeMounts:
            - name: k8s-secrets
              mountPath: /tmp

---
apiVersion: v1
kind: Service
metadata:
  name: k8s
spec:
  selector:
    app: k8s
  type: LoadBalancer
  ports:
    - port: 3001
      targetPort: 3001
