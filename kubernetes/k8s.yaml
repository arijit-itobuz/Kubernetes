apiVersion: v1
kind: Service
metadata:
  name: k8s
spec:
  selector:
    app: k8s
  type: LoadBalancer
  ports:
    - port: 3001
      targetPort: 3001

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s
spec:
  selector:
    matchLabels:
      app: k8s
  replicas: 5
  template:
    metadata:
      labels:
        app: k8s
    spec:
      containers:
        - name: kubernetes
          image: arijititobuz/kubernetes:2.0.0
          imagePullPolicy: Always
          resources:
            limits:
              memory: '128Mi'
              cpu: '250m'
          ports:
            - containerPort: 3001
